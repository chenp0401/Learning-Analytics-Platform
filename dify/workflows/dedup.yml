# ============================================================
# 文档查重工作流配置
# ============================================================
#
# 此文件描述了在 Dify 控制台中创建查重工作流的配置说明。
# Dify 工作流通过控制台 UI 创建，此文件作为配置参考文档。
#
# 工作流名称：文档查重（Dedup）
# 工作流类型：Workflow
#
# ============================================================

# 工作流结构：
#
#   [开始] → [知识库检索节点] → [LLM 分析节点] → [结果聚合节点] → [结束]
#
# ============================================================

workflow:
  name: "文档查重工作流"
  description: "与文档库进行多级查重比对，检测重复内容"
  type: workflow

  # 输入变量
  inputs:
    - name: text
      type: string
      required: true
      description: "待查重的文档文本内容"
    - name: task
      type: string
      required: false
      default: "dedup_analysis"
      description: "任务类型标识"

  # 节点定义
  nodes:
    # 节点 1：知识库检索
    - id: knowledge_retrieval
      type: knowledge_retrieval
      dataset_ids:
        - "{{DEDUP_DATASET_ID}}"
      query: "{{text}}"
      retrieval_model:
        search_method: hybrid_search
        reranking_enable: true
        top_k: 10
        score_threshold_enabled: true
        score_threshold: 0.5

    # 节点 2：LLM 核心内容分析
    - id: llm_analysis
      type: llm
      model:
        provider: deepseek
        name: deepseek-chat
        temperature: 0.1
        max_tokens: 4096
      prompt: |
        你是一个专业的教育文档查重分析助手。请分析上传文档与检索到的相似文档之间的关系。

        ## 上传文档内容
        ```
        {{text}}
        ```

        ## 知识库检索结果
        ```
        {{knowledge_retrieval.result}}
        ```

        ## 分析要求
        1. 对比上传文档与每个检索结果的核心内容
        2. 判断是否存在以下类型的重复：
           - **核心内容相同**：题目考查的知识点、题干逻辑相同，但表述不同
           - **语义相似**：表达方式相似，但不完全相同
        3. 给出每个匹配项的相似度百分比（0-100）

        ## 输出格式
        请严格按照以下 JSON 格式输出：
        ```json
        {
          "matches": [
            {
              "similarity": 75,
              "source": "匹配文档名称",
              "matched_content": "匹配文档中的相关内容片段",
              "uploaded_content": "上传文档中的对应内容片段",
              "analysis": "相似原因分析"
            }
          ]
        }
        ```

        注意事项：
        - 只返回相似度 >= 40% 的匹配项
        - 如果没有发现相似内容，返回 {"matches": []}
        - 只返回 JSON，不要有其他文字

    # 节点 3：结果输出
    - id: output
      type: end
      outputs:
        - name: result
          type: string
          value: "{{llm_analysis.text}}"

  # 输出变量
  outputs:
    - name: result
      type: string
      description: "查重分析结果 JSON"

# ============================================================
# 知识库配置说明
# ============================================================
#
# 1. 在 Dify 控制台创建知识库：
#    - 名称：教育文档库
#    - 索引方式：高质量（High Quality）
#    - 向量数据库：Weaviate
#
# 2. 导入文档：
#    - 支持批量上传 Word、PDF、TXT 文件
#    - 建议按学科/年级分类创建多个知识库
#
# 3. 获取知识库 ID：
#    - 在知识库详情页面的 URL 中获取
#    - 配置到环境变量 DIFY_DEDUP_DATASET_ID
#
# ============================================================
