# ============================================================
# Dify 自托管部署配置 v1.13.3
# 用于教育辅助平台的 AI 工作流引擎
# 从 0.15.3 升级到 1.13.3
# ============================================================

x-shared-env: &shared-api-worker-env
  CONSOLE_API_URL: ""
  CONSOLE_WEB_URL: ""
  SERVICE_API_URL: ""
  APP_API_URL: ""
  APP_WEB_URL: ""
  FILES_URL: ""
  LOG_LEVEL: INFO
  LOG_FILE: /app/logs/server.log
  LOG_FILE_MAX_SIZE: "20"
  LOG_FILE_BACKUP_COUNT: "5"
  DEBUG: "false"
  FLASK_DEBUG: "false"
  SECRET_KEY: ${DIFY_SECRET_KEY:-sk-edu-platform-dify-secret-key-change-me}
  INIT_PASSWORD: ${DIFY_INIT_PASSWORD:-}
  DEPLOY_ENV: PRODUCTION
  MIGRATION_ENABLED: "true"
  FILES_ACCESS_TIMEOUT: "300"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  DIFY_BIND_ADDRESS: "0.0.0.0"
  DIFY_PORT: "5001"
  SERVER_WORKER_AMOUNT: "1"
  SERVER_WORKER_CLASS: gevent
  SERVER_WORKER_CONNECTIONS: "10"
  GUNICORN_TIMEOUT: "360"
  CELERY_AUTO_SCALE: "false"
  # 数据库配置
  DB_USERNAME: ${DIFY_DB_USERNAME:-postgres}
  DB_PASSWORD: ${DIFY_DB_PASSWORD:-difypassword}
  DB_HOST: dify-postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DIFY_DB_DATABASE:-dify}
  SQLALCHEMY_POOL_SIZE: "30"
  SQLALCHEMY_MAX_OVERFLOW: "10"
  SQLALCHEMY_POOL_RECYCLE: "3600"
  SQLALCHEMY_ECHO: "false"
  # Redis 配置
  REDIS_HOST: dify-redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyredis}
  REDIS_DB: "0"
  # Celery 配置
  CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-difyredis}@dify-redis:6379/1
  # 存储配置（新版使用 opendal）
  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: storage
  # 向量数据库配置
  VECTOR_STORE: weaviate
  WEAVIATE_ENDPOINT: http://weaviate:8080
  WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
  WEAVIATE_GRPC_ENDPOINT: grpc://weaviate:50051
  # 沙箱配置
  CODE_EXECUTION_ENDPOINT: http://sandbox:8194
  CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  CODE_MAX_NUMBER: "9999999999999"
  CODE_MIN_NUMBER: "-9999999999999"
  CODE_MAX_DEPTH: "5"
  CODE_MAX_PRECISION: "20"
  CODE_MAX_STRING_LENGTH: "80000"
  CODE_MAX_STRING_ARRAY_LENGTH: "30"
  CODE_MAX_OBJECT_ARRAY_LENGTH: "30"
  CODE_MAX_NUMBER_ARRAY_LENGTH: "1000"
  # SSRF 代理
  SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
  SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128

services:
  # 初始化容器（修复权限）
  init_permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG_FILE="/app/api/storage/.init_permissions"
        if [ -f "$${FLAG_FILE}" ]; then
          echo "Permissions already initialized. Exiting."
          exit 0
        fi
        echo "Initializing permissions for /app/api/storage"
        chown -R 1001:1001 /app/api/storage && touch "$${FLAG_FILE}"
        echo "Permissions initialized. Exiting."
    volumes:
      - ./volumes/app/storage:/app/api/storage
    restart: "no"
    networks:
      - dify-network

  # Dify API 服务
  api:
    image: langgenius/dify-api:1.13.3
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: api
      PLUGIN_REMOTE_INSTALL_HOST: ${EXPOSE_PLUGIN_DEBUGGING_HOST:-localhost}
      PLUGIN_REMOTE_INSTALL_PORT: ${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}
      PLUGIN_MAX_PACKAGE_SIZE: "52428800"
      PLUGIN_DAEMON_TIMEOUT: "600.0"
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_started
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - dify-network
      - app-network

  # Dify Worker 服务（异步任务处理）
  worker:
    image: langgenius/dify-api:1.13.3
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: worker
      PLUGIN_MAX_PACKAGE_SIZE: "52428800"
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_started
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - dify-network

  # Dify Worker Beat 服务（定时任务调度）
  worker_beat:
    image: langgenius/dify-api:1.13.3
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: beat
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_started
    networks:
      - ssrf_proxy_network
      - dify-network

  # Dify Web 前端（管理控制台）
  web:
    image: langgenius/dify-web:1.13.3
    restart: always
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
      SENTRY_DSN: ""
      NEXT_TELEMETRY_DISABLED: "0"
      TEXT_GENERATION_TIMEOUT_MS: "60000"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai
    networks:
      - dify-network

  # 插件守护进程
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: always
    environment:
      <<: *shared-api-worker-env
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      SERVER_PORT: "5002"
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      MAX_PLUGIN_PACKAGE_SIZE: "52428800"
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
      PLUGIN_REMOTE_INSTALLING_HOST: "0.0.0.0"
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "true"
      PYTHON_ENV_INIT_TIMEOUT: "120"
      PLUGIN_MAX_EXECUTION_TIMEOUT: "600"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
    ports:
      - "${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}:5003"
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      dify-postgres:
        condition: service_healthy
    networks:
      - dify-network

  # 代码沙箱
  sandbox:
    image: langgenius/dify-sandbox:0.2.14
    restart: always
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: "8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./volumes/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
    networks:
      - ssrf_proxy_network

  # SSRF 防护代理
  ssrf_proxy:
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      [
        "sh",
        "-c",
        "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh",
      ]
    environment:
      HTTP_PORT: "3128"
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: "8194"
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: "8194"
    networks:
      - ssrf_proxy_network
      - dify-network

  # Dify Nginx 网关
  dify-nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf.template
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      [
        "sh",
        "-c",
        "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh",
      ]
    environment:
      NGINX_SERVER_NAME: _
      NGINX_HTTPS_ENABLED: "false"
      NGINX_PORT: "80"
      NGINX_WORKER_PROCESSES: auto
      NGINX_CLIENT_MAX_BODY_SIZE: 100M
      NGINX_KEEPALIVE_TIMEOUT: "65"
      NGINX_PROXY_READ_TIMEOUT: 3600s
      NGINX_PROXY_SEND_TIMEOUT: 3600s
    ports:
      - "3002:80"
    depends_on:
      - api
      - web
    networks:
      - dify-network
      - app-network

  # Weaviate 向量数据库
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
      AUTHENTICATION_APIKEY_USERS: hello@edu-platform.com
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@edu-platform.com
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    ports:
      - "8080:8080"
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - dify-network

  # Dify 专用 PostgreSQL
  dify-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DIFY_DB_DATABASE:-dify}
      POSTGRES_USER: ${DIFY_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-difypassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c 'max_connections=100'
               -c 'shared_buffers=128MB'
               -c 'work_mem=4MB'
               -c 'maintenance_work_mem=64MB'
               -c 'effective_cache_size=4096MB'
    ports:
      - "5433:5432"
    volumes:
      - dify-postgres-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify-network

  # Dify 专用 Redis
  dify-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${DIFY_REDIS_PASSWORD:-difyredis}
    ports:
      - "6380:6379"
    volumes:
      - dify-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DIFY_REDIS_PASSWORD:-difyredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify-network

volumes:
  dify-postgres-data:
  dify-redis-data:
  weaviate-data:

networks:
  dify-network:
    driver: bridge
  ssrf_proxy_network:
    driver: bridge
    internal: true
  # 与主应用共享网络
  app-network:
    external: true
    name: edu-platform_app-network
